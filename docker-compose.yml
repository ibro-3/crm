services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-crm}
      POSTGRES_USER: ${DB_USER:-crmuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crmpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-crm}
      - DB_USER=${DB_USER:-crmuser}
      - DB_PASSWORD=${DB_PASSWORD:-crmpass}
    depends_on:
      - db
    command: >
      sh -c "./wait-for-db.sh db 5432 &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn crm.wsgi:application --bind 0.0.0.0:8000"
    networks:
      - crm-network

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - crm-network

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_data:
